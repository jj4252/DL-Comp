# @package _global_
data:
  dataset_name: open_images
  cache_dir: /scratch/jj4252/Nov_14_distill/cache_images
  data_dir: /scratch/jj4252/Nov_14_distill/ssl_project/DL-Comp/data/Open_Images_downsampled

  # Image preprocessing
  image_size: 96  # Match the model's input size

 # Data augmentation for SSL
  augmentation:
    color_jitter: 0.4
    grayscale_prob: 0.2
    # [p_first_global, p_second_global, p_local]
    gaussian_blur_prob: [1.0, 0.1, 0.5]
    solarization_prob: [0.0, 0.2, 0.0]
    horizontal_flip_prob: 0.5
